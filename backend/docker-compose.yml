services:
    postgres:
        image: postgres:16
        environment:
            POSTGRES_DB: messaging
            POSTGRES_USER: messaging
            POSTGRES_PASSWORD: messaging
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data/

    redis:
        image: redis:7
        ports:
            - '6379:6379'

volumes:
    postgres_data:
